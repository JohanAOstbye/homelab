name: my one and only env:)
config:
  name: homelab
  dnsZone: ostbye.dev
  providers:
    dns: cloudflare
    secrets: openbao
    hosting: local
    expose: ddns
    vpn: tailscale
    auth: keycloak
    git: internal
gitCreds:
  main:
    base: https://github.com/JohanAOstbye
    username: JohanAOstbye
    password_env: GIT_MAIN_PAT
platformRepo:
  credsRef: main
  url: https://github.com/JohanAOstbye/halvnais.git
  path: /
  revision: test
clusterRepo:
  credsRef: main
  url: https://github.com/JohanAOstbye/homelab.git
  path: /
  revision: main
gitea:
  url: https://git.ostbye.dev
  org: johanaostbye
  admin_username: johanaostbye
  admin_password_secret:
    name: gitea-admin
    namespace: core-gitea
    key: password
containerRegistry:
  # ghcr.io creds for pulling private platform images (dashboard, docs) published
  # under the fork org. Bootstrap writes these into the github-creds secret.
  # Reuses the existing GIT_MAIN_PAT (has read:packages), so no extra token needed.
  server: ghcr.io
  username: johanaostbye
  password_env: GIT_MAIN_PAT
